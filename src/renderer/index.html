<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:;" />
  <title>pnex</title>
  <link rel="stylesheet" href="styles/xterm.css" />
  <link rel="stylesheet" href="styles/output.css" />
  <link rel="stylesheet" href="styles/terminal.css" />
</head>
<body class="bg-[#1e1e1e] text-[#cccccc] h-screen w-screen overflow-hidden flex flex-col m-0 p-0">
  <header id="titlebar" class="flex items-center h-9 shrink-0 select-none border-b border-[#2a2d2e] bg-[#181818] text-[#cccccc]">
    <div class="flex items-center px-3 gap-3 min-w-0 flex-1" style="-webkit-app-region: drag;">
      <div id="titlebar-icon" class="w-4 h-4 shrink-0 rounded-sm bg-[#0e639c] text-[10px] leading-4 text-center font-semibold" style="-webkit-app-region: no-drag;">P</div>
      <nav class="flex items-center gap-4 text-sm" style="-webkit-app-region: no-drag;">
        <button class="titlebar-menu-item" data-menu="file">File</button>
        <button class="titlebar-menu-item" data-menu="edit">Edit</button>
        <button class="titlebar-menu-item" data-menu="help">Help</button>
      </nav>
    </div>
    <div id="window-controls" class="flex items-stretch self-stretch" style="-webkit-app-region: no-drag;">
      <button id="window-minimize" class="window-control" aria-label="Minimize">&#8212;</button>
      <button id="window-maximize" class="window-control" aria-label="Maximize">□</button>
      <button id="window-close" class="window-control window-control-close" aria-label="Close">×</button>
    </div>
  </header>

  <div id="menu-popup" class="hidden fixed z-50 min-w-40 max-w-[80vw] overflow-y-auto max-h-[80vh] rounded border border-[#3c3c3c] bg-[#252526] py-1 shadow-lg"></div>

  <div id="terminal-container" class="flex-1 relative overflow-hidden">
    <div id="terminal" class="w-full h-full"></div>
    <div id="ai-hint" class="absolute bottom-2 right-4 text-xs opacity-30 pointer-events-none select-none font-mono">
      Ctrl + I for AI
    </div>
  </div>

  <!-- Inline Chat Bar -->
  <div id="chat-overlay" class="fixed inset-0 z-50 pointer-events-none" style="display: none;">
    <div id="chat-box" class="rounded-md border overflow-hidden pointer-events-auto" style="background: #252526; border-color: #3c3c3c; position: fixed; min-width: 320px; max-width: min(560px, calc(100vw - 32px));">
      <div id="chat-response" class="px-3 py-2 text-sm font-mono whitespace-pre-wrap max-h-40 overflow-y-auto" style="display: none; color: #cccccc;"></div>
      <div class="flex items-center px-3 py-1">
        <span id="chat-mode-label" class="text-xs uppercase tracking-wide mr-2 shrink-0" style="color: #569cd6;">AI Command</span>
        <input
          id="chat-input"
          type="text"
          class="flex-1 bg-transparent outline-none text-sm font-mono"
          placeholder="Ask about commands"
          autocomplete="off"
          spellcheck="false"
          style="color: #cccccc;"
        />
        <button id="chat-close" class="ml-2 opacity-50 hover:opacity-100 text-xs cursor-pointer" style="color: #cccccc;">Esc</button>
        <button id="chat-send" class="ml-2 px-2 py-0.5 rounded text-xs cursor-pointer" style="background: #0e639c; color: #ffffff;">Send</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
