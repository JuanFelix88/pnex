<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:;" />
  <title>pnex</title>
  <link rel="stylesheet" href="styles/xterm.css" />
  <link rel="stylesheet" href="styles/output.css" />
  <link rel="stylesheet" href="styles/terminal.css" />
</head>

<body class="bg-[#1e1e1e] text-[#cccccc] h-screen w-screen overflow-hidden flex flex-col m-0 p-0">
  <header id="titlebar"
    class="flex items-center h-9 shrink-0 select-none border-b border-[#2a2d2e] bg-[#181818] text-[#cccccc]">
    <div class="flex items-center px-3 gap-3 min-w-0 flex-1" style="-webkit-app-region: drag;">

      <svg id="titlebar-icon" alt="pnex" class="w-3 h-3 shrink-0 opacity-70"
        style="-webkit-app-region: no-drag;" viewBox="0 0 170 213" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M73.9804 36.4176C106.182 36.4178 97.0992 36.4173 108.989 36.4176C128.144 38.3992 130.126 48.9679 130.126 48.9679C130.126 48.9679 132.768 60.8574 122.2 72.0867C89.8333 72.0867 52.8433 72.0867 52.8433 72.0867C52.8433 72.0867 57.467 56.8941 73.9804 36.4176Z"
          fill="white" fill-opacity="0.8" style="fill:currentColor;fill-opacity:0.8;" />
        <path
          d="M43.5955 103.792H85.8699L42.2744 143.425C42.2744 143.425 45.6347 145.026 39.6323 143.425C40.2927 127.572 43.5955 103.792 43.5955 103.792Z"
          fill="white" fill-opacity="0.8" style="fill:currentColor;fill-opacity:0.8;" />
        <path
          d="M111.631 0.0878906C143.337 0.748428 156.547 20.5645 156.547 20.5645C156.547 20.5645 189.574 56.2335 150.603 98.5079C113.612 128.232 93.7963 144.085 72.6592 160.598C71.3381 181.736 77.9435 212.781 67.3749 212.781H43.5955L39.6323 179.093V144.085L121.539 72.0864C121.539 72.0864 147.96 41.7017 108.989 36.4174C98.4201 36.4174 88.5121 36.4174 73.9802 36.4174C79.2645 29.8121 89.8331 17.9224 89.8331 17.9224C89.8331 17.9224 101.062 8.01433 111.631 0.0878906Z"
          fill="white" fill-opacity="0.95" style="fill:currentColor;fill-opacity:0.95;" />
        <path
          d="M21.0073 0.10017C21.0073 0.10017 1.97607 -1.41655 0.660537 7.35372C1.98176 39.7198 0 212.12 0 212.12C0 212.12 23.1188 212.781 43.5954 212.781C31.7058 99.1694 48.8797 48.9681 111.631 0.10017C64.0721 0.100231 41.6138 0.747823 21.0073 0.10017Z"
          fill="white" style="fill:currentColor;fill-opacity:1;" />
      </svg>
      <!-- <img id="titlebar-icon" src="./assets/p.svg" /> -->
      <nav class="flex items-center gap-4 text-sm" style="-webkit-app-region: no-drag;">
        <button class="titlebar-menu-item" data-menu="file">File</button>
        <button class="titlebar-menu-item" data-menu="edit">Edit</button>
        <button class="titlebar-menu-item" data-menu="help">Help</button>
      </nav>
    </div>
    <div id="window-controls" class="flex items-stretch self-stretch" style="-webkit-app-region: no-drag;">
      <button id="window-minimize" class="window-control" aria-label="Minimize">&#8212;</button>
      <button id="window-maximize" class="window-control" aria-label="Maximize">□</button>
      <button id="window-close" class="window-control window-control-close" aria-label="Close">×</button>
    </div>
  </header>

  <div id="menu-popup"
    class="hidden fixed z-50 min-w-40 max-w-[80vw] overflow-y-auto max-h-[80vh] rounded border border-[#3c3c3c] bg-[#252526] py-1 shadow-lg">
  </div>

  <div id="terminal-container" class="flex-1 relative overflow-hidden">
    <div id="terminal" class="w-full h-full"></div>
    <div id="ai-hint" class="absolute bottom-2 right-4 text-xs opacity-30 pointer-events-none select-none font-mono">
      Ctrl + I for AI
    </div>
  </div>

  <!-- Inline Chat Bar -->
  <div id="chat-overlay" class="fixed inset-0 z-50 pointer-events-none" style="display: none;">
    <div id="chat-box" class="rounded-md border overflow-hidden pointer-events-auto"
      style="background: #252526; border-color: #3c3c3c; position: fixed; min-width: 320px; max-width: min(560px, calc(100vw - 32px));">
      <div id="chat-response" class="px-2 py-1 whitespace-pre-wrap max-h-40 overflow-y-auto"
        style="display: none; color: #cccccc;"></div>
      <div class="flex items-center px-2 py-0.5">
        <span id="chat-mode-label" class="text-xs uppercase tracking-wide mr-2 shrink-0" style="color: #569cd6;">AI
          Command</span>
        <input id="chat-input" type="text" class="flex-1 bg-transparent outline-none"
          placeholder="Ask about commands" autocomplete="off" spellcheck="false" style="color: #cccccc;" />
        <button id="chat-close" class="ml-2 opacity-50 hover:opacity-100 text-xs cursor-pointer"
          style="color: #cccccc;">Esc</button>
        <button id="chat-send" class="ml-2 px-2 py-0.5 rounded text-xs cursor-pointer"
          style="background: #0e639c; color: #ffffff;">Send</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
